name: Feature Request
description: Suggest an idea or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem to solve and the outcome you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature address? Who is affected?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated, if any.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, or other details that help evaluate the request.
    validations:
      required: false
